<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>productivity tool</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <center>
        <h1>PRODUCTIVITY TOOL</h1>
    </center>

    <br>


    <input type="text" id="taskInput" placeholder="Enter a task">

    <select id="prioritySelect">

        <option value="1">Low</option>

        <option value="2">Medium</option>

        <option value="3">High</option>

    </select>

    <button id="addBtn">Add Task</button>
    <p id="taskStats"></p>

    <button id="allBtn">All</button>

    <button id="completedBtn">Completed</button>

    <button id="pendingBtn">Pending</button>

    <ul id="taskList"></ul>
    <canvas id="productivityChart"></canvas>

    <label for="intervalInput">
        Graph Interval (minutes):
    </label>

    <input type="number" id="intervalInput" value="60" min="1" max="240">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
